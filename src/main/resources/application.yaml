spring:
  application:
    name: strnd-api
  datasource:
    url: jdbc:mysql://gateway01.ap-northeast-1.prod.aws.tidbcloud.com:4000/strnd?sslMode=VERIFY_IDENTITY&enabledTLSProtocols=TLSv1.2,TLSv1.3&serverTimezone=Asia/Seoul&connectionTimeZone=Asia/Seoul&forceConnectionTimeZoneToSession=true&characterEncoding=UTF-8
    username: 36YVpNLCnj5RKVk.root
    password: ${TIDB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

server:
  port: 8080
  error:
    include-message: always

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-handlers-package: com.strnd.api.common.typehandler
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

jwt:
  secret: strnd-secret-key-must-be-at-least-32-characters-long
  expiration: 28800000                # 8시간 (ms)
  expiration-remember-me: 604800000   # 7일 (ms)

app:
  # ----- LOCAL ----- #
#  frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:5173}
  # ----- PROD ----- #
  frontend-base-url: ${FRONTEND_BASE_URL:https://strnd.vercel.app}

logging:
  level:
    com.strnd.api: DEBUG